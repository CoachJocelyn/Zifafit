    <header class="zifa-navbar">

      <button class="zifa-menu-button"

  <script>
    const button = document.querySelector(".zifa-menu-button");
    const menu = document.querySelector(".zifa-menu");

    button.addEventListener("click", () => {
      const open = button.getAttribute("aria-expanded") === "true";
      button.setAttribute("aria-expanded", String(!open));
      menu.classList.toggle("open");
    });
  </script>
